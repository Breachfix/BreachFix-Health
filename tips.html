<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Health Tips</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f9f5;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    h1 {
      color: #2b7a78;
    }

    .date {
      margin-top: 10px;
      font-size: 1.1em;
      color: #555;
    }

    .tip-box {
      background: #ffffff;
      border-radius: 12px;
      padding: 25px;
      margin-top: 20px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: all 0.3s ease-in-out;
    }

    .tip-text {
      font-size: 1.2em;
      line-height: 1.5;
      text-align: center;
    }

    button {
      margin-top: 20px;
      background-color: #3aafa9;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      transition: background 0.2s ease-in-out;
    }

    button:hover {
      background-color: #2b7a78;
    }
  </style>
</head>
<body>

  <h1>🌿 Daily Health Tip</h1>
  <div class="date" id="today-date"></div>

  <div class="tip-box">
    <p class="tip-text" id="health-tip">Loading tip...</p>
  </div>

  <button onclick="showRandomTip()">Show Another Tip</button>

  <script>
    const tips = [
      "Drink at least 8 glasses of water today to stay hydrated.",
      "Take a brisk 10-minute walk during your break to boost circulation.",
      "Replace sugary snacks with a piece of fruit for better energy.",
      "Practice deep breathing for 5 minutes to reduce stress.",
      "Avoid screens at least 30 minutes before bedtime for better sleep.",
      "Add leafy greens like spinach to your lunch for extra nutrients.",
      "Take time to stretch after sitting for long hours.",
      "Get some sunlight exposure in the morning to help regulate sleep.",
      "Plan your meals to avoid last-minute unhealthy choices.",
      "Get 7–9 hours of sleep to help your body recharge."
    ];

    function showDate() {
      const dateElement = document.getElementById('today-date');
      const today = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      dateElement.textContent = today.toLocaleDateString(undefined, options);
    }

    function showRandomTip() {
      const tipElement = document.getElementById('health-tip');
      const randomIndex = Math.floor(Math.random() * tips.length);
      tipElement.textContent = tips[randomIndex];
    }

    // Initialize on page load
    window.onload = function() {
      showDate();
      showRandomTip();
    };
  </script>

</body>
</html>
